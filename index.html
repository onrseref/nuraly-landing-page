<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Nuraly — App Store'da İndir</title>
  <meta name="description" content="Nuraly — Muslim Prayer Lock uygulamasını App Store'dan indir.">
  <meta name="apple-itunes-app" content="app-id=6761827025">
  <meta name="theme-color" content="#0c3b2e">
  <link rel="icon" href="https://is1-ssl.mzstatic.com/image/thumb/Purple211/v4/ac/cb/30/accb309d-3d66-c337-63a1-251f541f9f9d/AppIcon-0-0-1x_U007emarketing-0-6-0-85-220.png/512x512bb.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=5">
</head>
<body class="download-page">
  <main class="download-page__main">
    <img
      class="download-page__app-icon"
      src="https://is1-ssl.mzstatic.com/image/thumb/Purple211/v4/ac/cb/30/accb309d-3d66-c337-63a1-251f541f9f9d/AppIcon-0-0-1x_U007emarketing-0-6-0-85-220.png/512x512bb.jpg"
      alt="Nuraly uygulama ikonu"
      width="120"
      height="120"
    >
    <button id="download-button" class="download-page__button" type="button">
      <svg class="download-page__apple" viewBox="0 0 24 24" aria-hidden="true">
        <path fill="currentColor" d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
      </svg>
      App Store'da İndir
    </button>
  </main>

  <div id="browser-popup" class="browser-popup" hidden>
    <div class="browser-popup__backdrop" data-close-popup></div>
    <div class="browser-popup__sheet" role="dialog" aria-modal="true" aria-labelledby="browser-popup-title">
      <div class="browser-popup__handle" aria-hidden="true"></div>
      <h2 id="browser-popup-title" class="browser-popup__title">Tarayıcıda Aç</h2>
      <p class="browser-popup__text">Hangi tarayıcıda açmak istiyorsun?</p>

      <div class="browser-picker">
        <button id="open-safari" class="browser-picker__option" type="button">
          <span class="browser-picker__icon browser-picker__icon--safari" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8"/>
              <polygon points="16,8 10.5,15 8,12.5" fill="currentColor"/>
            </svg>
          </span>
          <span class="browser-picker__label">Safari</span>
        </button>
        <button id="open-chrome" class="browser-picker__option" type="button">
          <span class="browser-picker__icon browser-picker__icon--chrome" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="9" fill="#4285F4"/>
              <path d="M12 3a9 9 0 0 1 7.8 4.5H12V3z" fill="#EA4335"/>
              <path d="M4.2 7.5A9 9 0 0 0 3 12h9V3.9A9 9 0 0 0 4.2 7.5z" fill="#FBBC05"/>
              <path d="M4.2 16.5A9 9 0 0 0 12 21v-9H3a9 9 0 0 0 1.2 4.5z" fill="#34A853"/>
              <circle cx="12" cy="12" r="3.5" fill="#fff"/>
            </svg>
          </span>
          <span class="browser-picker__label">Chrome</span>
        </button>
      </div>

      <p id="browser-status" class="browser-popup__status" hidden></p>

      <details class="browser-popup__fallback">
        <summary>Açılmazsa manuel yöntem</summary>
        <ol class="browser-popup__steps">
          <li>Sağ üstteki <strong>⋯</strong> menüsüne dokun</li>
          <li><strong>Tarayıcıda Aç</strong> veya <strong>Safari'de Aç</strong>'ı seç</li>
        </ol>
        <button id="copy-link" class="browser-popup__copy" type="button">Linki Kopyala</button>
      </details>
    </div>
  </div>

  <script src="download.js?v=5"></script>
</body>
</html>
