<body class="download-page">
  <main class="download-page__main">
    <img

      alt="Nuraly uygulama ikonu"
      width="120"
      height="120"
    >
    <button id="download-button" class="download-page__button" type="button">
      <svg class="download-page__apple" viewBox="0 0 24 24" aria-hidden="true">
        <path fill="currentColor" d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
      </svg>
      App Store'da İndir
    </button>
  </main>

  <div id="browser-popup" class="browser-popup" hidden>
    <div class="browser-popup__backdrop" data-close-popup></div>
    <div class="browser-popup__sheet" role="dialog" aria-modal="true" aria-labelledby="browser-popup-title">
      <div class="browser-popup__handle" aria-hidden="true"></div>
      <h2 id="browser-popup-title" class="browser-popup__title">Safari veya Chrome'da Aç</h2>
      <p class="browser-popup__text">
        TikTok içinden App Store açılmaz. Linki kopyalayıp tarayıcında açman gerekiyor.
      </p>

      <ol class="browser-popup__steps">
        <li>Aşağıdaki butona basarak <strong>linki kopyala</strong></li>
        <li><strong>Safari</strong> veya <strong>Chrome</strong> uygulamasını aç</li>
        <li>Adres çubuğuna <strong>yapıştır</strong> ve git</li>
        <li>Açılan sayfada <strong>App Store'da İndir</strong>'e bas</li>
      </ol>

      <p id="copy-status" class="browser-popup__status" hidden>Link kopyalandı ✓</p>

      <button id="copy-link" class="browser-popup__primary" type="button">
        Linki Kopyala
      </button>
    </div>
  </div>

  <script src="download.js?v=6"></script>
